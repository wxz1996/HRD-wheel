services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  robot-bridge:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.bridge
    container_name: robot-bridge
    environment:
      ROBOT_ADAPTER: mqtt_json
      ROBOT_PORT: "8000"
      MQTT_HOST: mqtt-broker
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: hrd
      MQTT_ROBOT_ID: robot-001
      MQTT_TIMEOUT_SECONDS: "6.0"
    depends_on:
      - mqtt-broker
    ports:
      - "8000:8000"
    restart: unless-stopped

  robot-agent-stub:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.bridge
    container_name: robot-agent-stub
    command:
      - uv
      - run
      - python
      - scripts/run_robot_mqtt_agent_stub.py
      - --mqtt-host
      - mqtt-broker
      - --mqtt-port
      - "1883"
      - --topic-prefix
      - hrd
      - --robot-id
      - robot-001
    depends_on:
      - mqtt-broker
    restart: unless-stopped
