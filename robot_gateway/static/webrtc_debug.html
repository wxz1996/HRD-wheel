<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Robot Gateway WebRTC Debug</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    video { width: 640px; height: 480px; background: #111; }
    input { width: 280px; }
  </style>
</head>
<body>
  <h2>WebRTC Debug Viewer</h2>
  <label>camera_topic: <input id="topic" value="/camera/image_raw" /></label>
  <button id="connect">Connect</button>
  <button id="close">Close</button>
  <pre id="log"></pre>
  <video id="remoteVideo" autoplay playsinline></video>

  <script>
    const log = (msg) => document.getElementById('log').textContent += msg + '\n';
    let pc = null;
    let sessionId = null;

    async function connect() {
      pc = new RTCPeerConnection();
      pc.ontrack = (evt) => {
        const [stream] = evt.streams;
        document.getElementById('remoteVideo').srcObject = stream;
      };
      pc.addTransceiver('video', { direction: 'recvonly' });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const payload = {
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type,
        camera_topic: document.getElementById('topic').value,
        width: 640,
        height: 480,
        fps: 15,
      };

      const resp = await fetch('/webrtc/offer', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) {
        log('offer failed: ' + await resp.text());
        return;
      }
      const ans = await resp.json();
      sessionId = ans.session_id;
      await pc.setRemoteDescription(ans);
      log('connected, session=' + sessionId);
    }

    async function closeSession() {
      if (pc) {
        pc.close();
        pc = null;
      }
      if (sessionId) {
        await fetch(`/webrtc/${sessionId}:close`, { method: 'POST' });
        log('closed session=' + sessionId);
        sessionId = null;
      }
    }

    document.getElementById('connect').onclick = connect;
    document.getElementById('close').onclick = closeSession;
  </script>
</body>
</html>
